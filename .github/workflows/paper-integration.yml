name: Paper Integration

on:
  workflow_dispatch:
  push:
    branches: [agent/issue-8-paper-integration-harness]

concurrency:
  group: mineintent-paper-ci
  cancel-in-progress: false

jobs:
  paper:
    runs-on: [self-hosted, Linux, ARM64, mineintent, paper-ci]
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      PATH: /home/spojchil/.nvm/versions/node/v22.22.0/bin:/usr/local/bin:/usr/bin:/bin
      npm_config_registry: https://registry.npmmirror.com
      MC_JAVA: /home/spojchil/.local/jdks/jdk-25.0.3+9-jre/bin/java
      MC_SERVER_JAR: /home/spojchil/mineintent-ci/cache/paper-1.21.1-133.jar
      MC_EULA: "true"
      MC_PORT: "25566"
      MC_ARTIFACTS_DIR: ${{ github.workspace }}/.artifacts/paper
    steps:
      - uses: actions/checkout@v4
      - run: pnpm install --frozen-lockfile
      - run: npm run check
      - run: npm run test:paper:ci
      - name: Upload Paper diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paper-integration-${{ github.run_id }}
          path: .artifacts/paper
          if-no-files-found: warn
          retention-days: 14
