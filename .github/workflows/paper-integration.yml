name: Paper Integration

on:
  workflow_dispatch:

concurrency:
  group: mineintent-paper-ci
  cancel-in-progress: false

jobs:
  paper:
    runs-on: [self-hosted, mineintent, paper-ci]
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      PATH: ${{ vars.PAPER_CI_NODE_BIN }}:/usr/local/bin:/usr/bin:/bin
      npm_config_registry: ${{ vars.PAPER_CI_NPM_REGISTRY }}
      MC_JAVA: ${{ vars.PAPER_CI_JAVA }}
      MC_SERVER_JAR: ${{ vars.PAPER_CI_JAR }}
      MC_SERVER_TEMPLATE: ${{ vars.PAPER_CI_TEMPLATE }}
      MC_EULA: "true"
      MC_PORT: "25566"
      MC_ARTIFACTS_DIR: ${{ github.workspace }}/.artifacts/paper
    steps:
      - uses: actions/checkout@v7
      - run: pnpm install --frozen-lockfile
      - run: npm run check
      - run: npm run test:paper:ci
      - name: Upload Paper diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: paper-integration-${{ github.run_id }}
          path: .artifacts/paper
          if-no-files-found: warn
          retention-days: 14
